<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age & Birthday Calculator | Naveen Siriwardhana</title>
    
    <!-- Tailwind CSS & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #0a192f;
            --text-main: #ffffff;
            --text-sub: #e2e8f0;
            --text-muted: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.08);
            --inner-box: rgba(255, 255, 255, 0.05);
            --grid-color: rgba(16, 185, 129, 0.05);
        }

        html.light {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-sub: #334155;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: rgba(15, 23, 42, 0.08);
            --inner-box: rgba(15, 23, 42, 0.04);
            --grid-color: rgba(16, 185, 129, 0.08);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-sub);
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
        }
    </style>
</head>
<body class="min-h-screen py-12 px-4 md:px-8 bg-[radial-gradient(circle_at_2px_2px,var(--grid-color)_1px,transparent_0)] bg-[size:30px_30px]">

    <div class="max-w-xl mx-auto container">
        
        <!-- Navigation -->
        <div class="flex justify-between items-center mb-8">
            <a href="index.html" class="glass-card px-4 py-2 rounded-xl text-sm font-semibold hover:text-emerald-400 transition-colors flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Back to Portfolio
            </a>
            <button id="theme-toggle" class="glass-card p-3 rounded-xl text-xl text-emerald-400 hover:text-emerald-300 focus:outline-none cursor-pointer">
                <i id="theme-icon" class="fa-solid fa-moon"></i>
            </button>
        </div>

        <!-- Header -->
        <div class="glass-card rounded-3xl p-6 text-center mb-6">
            <div class="inline-flex p-3 rounded-2xl bg-emerald-500/10 text-emerald-400 text-2xl mb-3">
                <i class="fa-solid fa-cake-candles"></i>
            </div>
            <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight mb-2" style="color: var(--text-main);">
                Age & Birthday Calculator
            </h1>
            <p class="text-sm tracking-wide text-emerald-400 uppercase mono text-xs">
                // Sinhala Style Exact Age & Countdown
            </p>
        </div>

        <!-- Calculator Content -->
        <div class="space-y-6">
            <!-- Input -->
            <div class="glass-card rounded-2xl p-6 space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase mb-2 tracking-wider">ඔබේ උපන් දිනය (Select Birth Date)</label>
                    <input type="date" id="birth-date" value="1998-07-25" class="w-full bg-slate-900/40 border border-emerald-500/10 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500 font-medium mono" style="color: var(--text-main);">
                </div>

                <button onclick="calculateAge()" class="w-full py-3 bg-emerald-500 hover:bg-emerald-400 text-slate-900 text-sm font-bold rounded-xl transition-all flex items-center justify-center gap-2 cursor-pointer shadow-md">
                    <i class="fa-solid fa-hourglass-start"></i> Calculate Age
                </button>
            </div>

            <!-- Output Display -->
            <div id="output-panel" class="glass-card rounded-2xl p-6 space-y-6">
                <!-- Age Output -->
                <div>
                    <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-3">// වර්තමාන වයස (Your Age)</h2>
                    <div class="grid grid-cols-3 gap-2 text-center">
                        <div class="p-3 rounded-xl" style="background: var(--inner-box);">
                            <div id="out-years" class="text-xl md:text-2xl font-extrabold text-emerald-400 mono">0</div>
                            <div class="text-[10px] uppercase tracking-wider font-semibold mt-1">Years</div>
                        </div>
                        <div class="p-3 rounded-xl" style="background: var(--inner-box);">
                            <div id="out-months" class="text-xl md:text-2xl font-extrabold text-emerald-400 mono">0</div>
                            <div class="text-[10px] uppercase tracking-wider font-semibold mt-1">Months</div>
                        </div>
                        <div class="p-3 rounded-xl" style="background: var(--inner-box);">
                            <div id="out-days" class="text-xl md:text-2xl font-extrabold text-emerald-400 mono">0</div>
                            <div class="text-[10px] uppercase tracking-wider font-semibold mt-1">Days</div>
                        </div>
                    </div>
                </div>

                <!-- Next Birthday Output -->
                <div class="pt-4 border-t border-dashed border-emerald-500/10">
                    <h2 class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-3">// ඊළඟ උපන්දිනයට තව (Next Birthday Countdown)</h2>
                    <div class="p-4 rounded-xl text-center border border-emerald-500/10 bg-emerald-500/5">
                        <p id="out-next-birthday" class="text-sm font-semibold" style="color: var(--text-main);">Calculating...</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        function calculateAge() {
            const birthDateInput = document.getElementById('birth-date').value;
            if (!birthDateInput) {
                alert("කරුණාකර උපන් දිනයක් තෝරන්න!");
                return;
            }

            const birthDate = new Date(birthDateInput);
            const today = new Date();

            if (birthDate > today) {
                alert("උපන් දිනය අනාගත දිනයක් විය නොහැක!");
                return;
            }

            // 1. Calculate Exact Age
            let years = today.getFullYear() - birthDate.getFullYear();
            let months = today.getMonth() - birthDate.getMonth();
            let days = today.getDate() - birthDate.getDate();

            if (days < 0) {
                months--;
                // Get last day of previous month
                const prevMonth = new Date(today.getFullYear(), today.getMonth(), 0);
                days += prevMonth.getDate();
            }

            if (months < 0) {
                years--;
                months += 12;
            }

            // Update Age UI
            document.getElementById('out-years').innerText = years;
            document.getElementById('out-months').innerText = months;
            document.getElementById('out-days').innerText = days;

            // 2. Calculate Next Birthday
            let nextBirthday = new Date(today.getFullYear(), birthDate.getMonth(), birthDate.getDate());
            
            // උපන්දිනය මේ අවුරුද්දේ දැනටමත් ගෙවිලා නම් ඊළඟ අවුරුද්ද ගනිමු
            if (today > nextBirthday) {
                nextBirthday.setFullYear(today.getFullYear() + 1);
            }

            // Diff in time
            const diffTime = nextBirthday - today;
            const diffDaysTotal = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            // Convert total days to months & days for countdown style
            let nextMonths = nextBirthday.getMonth() - today.getMonth();
            let nextDays = nextBirthday.getDate() - today.getDate();

            if (nextDays < 0) {
                nextMonths--;
                const prevMonth = new Date(nextBirthday.getFullYear(), nextBirthday.getMonth(), 0);
                nextDays += prevMonth.getDate();
            }
            if (nextMonths < 0) {
                nextMonths += 12;
            }

            // Display Next Birthday (Sinhala Countdown Style)
            const outNext = document.getElementById('out-next-birthday');
            if (nextMonths === 0 && nextDays === 0) {
                outNext.innerHTML = `🎉 <span class="text-emerald-400 font-bold">සුභ උපන්දිනයක් වේවා මචන්!</span> Today is your birthday!`;
            } else {
                let countdownStr = "තව ";
                if (nextMonths > 0) countdownStr += `<span class="mono text-emerald-400 font-bold">${nextMonths}</span> මාසයයි `;
                if (nextDays > 0) countdownStr += `සහ <span class="mono text-emerald-400 font-bold">${nextDays}</span> දවසක් තියෙනවා!`;
                
                countdownStr += ` <br><span class="text-xs text-slate-400 font-normal mt-1 block">(Total: ${diffDaysTotal} Days remaining)</span>`;
                outNext.innerHTML = countdownStr;
            }
        }

        // Theme Switcher Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement;
        
        if (localStorage.getItem('theme') === 'light') { 
            htmlElement.classList.add('light'); 
            themeIcon.className = 'fa-solid fa-sun'; 
        }
        
        themeToggleBtn.addEventListener('click', () => {
            if (htmlElement.classList.contains('light')) {
                htmlElement.classList.remove('light');
                themeIcon.className = 'fa-solid fa-moon';
                localStorage.setItem('theme', 'dark');
            } else {
                htmlElement.classList.add('light');
                themeIcon.className = 'fa-solid fa-sun';
                localStorage.setItem('theme', 'light');
            }
        });

        // Run on Load
        calculateAge();
    </script>
</body>
</html>
