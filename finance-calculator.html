<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Lanka Finance Calculator | Naveen Siriwardhana</title>
    
    <!-- Tailwind CSS & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    
    <style>
        :root {
            --bg-color: #0a192f;
            --text-main: #ffffff;
            --text-sub: #e2e8f0;
            --text-muted: #94a3b8;
            --card-bg: rgba(255, 255, 255, 0.02);
            --card-border: rgba(255, 255, 255, 0.08);
            --inner-box: rgba(255, 255, 255, 0.05);
            --grid-color: rgba(16, 185, 129, 0.05);
            --input-bg: rgba(10, 25, 47, 0.7);
        }

        html.light {
            --bg-color: #f8fafc;
            --text-main: #0f172a;
            --text-sub: #334155;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.8);
            --card-border: rgba(15, 23, 42, 0.08);
            --inner-box: rgba(15, 23, 42, 0.04);
            --grid-color: rgba(16, 185, 129, 0.08);
            --input-bg: #ffffff;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-sub);
            transition: background-color 0.4s ease, color 0.4s ease;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
        }
        
        .grid-bg {
            background-image: radial-gradient(circle at 2px 2px, var(--grid-color) 1px, transparent 0);
            background-size: 30px 30px;
        }

        .tab-btn.active {
            background-color: rgba(16, 185, 129, 0.15);
            border-color: #10b981;
            color: #34d399;
        }
    </style>
</head>
<body class="grid-bg min-h-screen py-12 px-4 md:px-8">

    <div class="max-w-2xl mx-auto container space-y-8">
        
        <!-- Navigation & Theme Toggle -->
        <div class="flex justify-between items-center">
            <a href="index.html" class="glass-card px-4 py-2 rounded-xl text-sm font-semibold text-emerald-400 hover:text-emerald-300 transition-all flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Back to Profile
            </a>
            
            <button id="theme-toggle" class="glass-card p-3 rounded-xl text-emerald-400 hover:text-emerald-300 focus:outline-none cursor-pointer">
                <i id="theme-icon" class="fa-solid fa-moon"></i>
            </button>
        </div>

        <!-- Main Finance Card -->
        <div class="glass-card rounded-3xl p-8 shadow-xl">
            <div class="flex items-center gap-3 mb-6">
                <span class="text-3xl text-emerald-400"><i class="fa-solid fa-coins"></i></span>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight" style="color: var(--text-main);">Financial Calculator</h1>
                    <p class="text-xs mono uppercase tracking-wider text-emerald-400">// Leasing, Loans & Fixed Deposits</p>
                </div>
            </div>

            <!-- Navigation Tabs -->
            <div class="grid grid-cols-3 gap-2 p-1.5 rounded-2xl mb-8 border border-emerald-500/10" style="background: var(--inner-box);">
                <button onclick="switchTab('leasing')" id="tab-leasing" class="tab-btn active py-2.5 text-xs md:text-sm font-bold rounded-xl border border-transparent transition-all cursor-pointer flex items-center justify-center gap-1.5">
                    <i class="fa-solid fa-car"></i> Leasing
                </button>
                <button onclick="switchTab('loan')" id="tab-loan" class="tab-btn py-2.5 text-xs md:text-sm font-bold rounded-xl border border-transparent transition-all cursor-pointer flex items-center justify-center gap-1.5">
                    <i class="fa-solid fa-hand-holding-dollar"></i> Loan
                </button>
                <button onclick="switchTab('fd')" id="tab-fd" class="tab-btn py-2.5 text-xs md:text-sm font-bold rounded-xl border border-transparent transition-all cursor-pointer flex items-center justify-center gap-1.5">
                    <i class="fa-solid fa-vault"></i> FD
                </button>
            </div>

            <!-- INPUT SECTION -->
            <div class="space-y-4 mb-8">
                <!-- Dynamic Amount Label -->
                <div>
                    <label id="amount-label" class="block text-sm font-semibold mb-2" style="color: var(--text-main);">Lease Amount (Vehicle Value - Down Payment)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 font-bold text-sm" style="color: var(--text-muted);">LKR</span>
                        <input type="number" id="fin-amount" value="1000000" min="0" class="w-full p-3 pl-14 rounded-xl border border-emerald-500/20 focus:border-emerald-400 focus:outline-none mono" style="background: var(--input-bg); color: var(--text-main);">
                    </div>
                </div>

                <!-- Interest Rate & Period Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold mb-2" style="color: var(--text-main);">Annual Interest Rate (%)</label>
                        <div class="relative">
                            <span class="absolute right-4 top-3.5 font-bold text-sm" style="color: var(--text-muted);">%</span>
                            <input type="number" id="fin-rate" value="12" min="0" step="0.1" class="w-full p-3 pr-10 rounded-xl border border-emerald-500/20 focus:border-emerald-400 focus:outline-none mono" style="background: var(--input-bg); color: var(--text-main);">
                        </div>
                    </div>
                    <div>
                        <label id="period-label" class="block text-sm font-semibold mb-2" style="color: var(--text-main);">Period (Years)</label>
                        <select id="fin-period" class="w-full p-3 rounded-xl border border-emerald-500/20 focus:border-emerald-400 focus:outline-none font-semibold cursor-pointer mono" style="background: var(--input-bg); color: var(--text-main);">
                            <option value="1">1 Year (12 Months)</option>
                            <option value="2">2 Years (24 Months)</option>
                            <option value="3">3 Years (36 Months)</option>
                            <option value="4">4 Years (48 Months)</option>
                            <option value="5" selected>5 Years (60 Months)</option>
                            <option value="6">6 Years (72 Months)</option>
                            <option value="7">7 Years (84 Months)</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- RESULT DISPLAY BOXES -->
            <div id="result-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <!-- Box 1 -->
                <div class="p-4 rounded-xl border border-emerald-500/20 text-center bg-emerald-500/5">
                    <p id="box1-title" class="text-xs uppercase tracking-wider text-emerald-400 font-bold mb-1">Monthly Rental</p>
                    <div id="box1-value" class="text-2xl font-extrabold text-emerald-400 mono">LKR 0.00</div>
                </div>
                <!-- Box 2 -->
                <div class="p-4 rounded-xl border border-emerald-500/5 text-center" style="background: var(--inner-box);">
                    <p id="box2-title" class="text-xs uppercase tracking-wider text-emerald-400 font-bold mb-1">Total Interest</p>
                    <div id="box2-value" class="text-2xl font-extrabold mono" style="color: var(--text-main);">LKR 0.00</div>
                </div>
            </div>

            <!-- DETAILED BREAKDOWN SHEET -->
            <div class="p-4 rounded-xl border border-emerald-500/5 space-y-2.5 text-sm" style="background: var(--inner-box);">
                <p class="text-xs font-bold uppercase tracking-wider text-emerald-400 mb-3"><i class="fa-solid fa-list-check"></i> Summary Breakdown</p>
                <div class="flex justify-between border-b border-emerald-500/5 pb-1"><span id="sheet-label-amount" style="color: var(--text-muted);">Principal Amount:</span> <span id="sheet-amount" class="font-semibold mono">0.00</span></div>
                <div class="flex justify-between border-b border-emerald-500/5 pb-1"><span style="color: var(--text-muted);">Total Interest Paid:</span> <span id="sheet-interest" class="font-semibold mono text-amber-500">0.00</span></div>
                <div class="flex justify-between pt-1 font-bold" style="color: var(--text-main);"><span id="sheet-label-total" class="text-emerald-400">Total Payable Value:</span> <span id="sheet-total" class="mono text-emerald-400">0.00</span></div>
            </div>
        </div>
    </div>

    <script>
        let currentTab = 'leasing';

        const amountInput = document.getElementById('fin-amount');
        const rateInput = document.getElementById('fin-rate');
        const periodSelect = document.getElementById('fin-period');

        // Dynamic Text Elements
        const amountLabel = document.getElementById('amount-label');
        const periodLabel = document.getElementById('period-label');
        const box1Title = document.getElementById('box1-title');
        const box2Title = document.getElementById('box2-title');
        const box1Value = document.getElementById('box1-value');
        const box2Value = document.getElementById('box2-value');
        
        const sheetLabelAmount = document.getElementById('sheet-label-amount');
        const sheetLabelTotal = document.getElementById('sheet-label-total');
        const sheetAmount = document.getElementById('sheet-amount');
        const sheetInterest = document.getElementById('sheet-interest');
        const sheetTotal = document.getElementById('sheet-total');

        function switchTab(tab) {
            currentTab = tab;
            
            // Toggle active styles on buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');

            // Reset Default values & UI text configurations based on tab
            if (tab === 'leasing') {
                amountLabel.textContent = "Lease Amount (Vehicle Value - Down Payment)";
                periodLabel.textContent = "Lease Period (Years)";
                box1Title.textContent = "Estimated Monthly Rental";
                box2Title.textContent = "Total Lease Interest";
                sheetLabelAmount.textContent = "Leased Principal:";
                sheetLabelTotal.textContent = "Total Cost of Lease:";
            } else if (tab === 'loan') {
                amountLabel.textContent = "Loan Amount";
                periodLabel.textContent = "Loan Repayment Period";
                box1Title.textContent = "Monthly Installment (EMI)";
                box2Title.textContent = "Total Loan Interest";
                sheetLabelAmount.textContent = "Loan Principal:";
                sheetLabelTotal.textContent = "Total Cost of Loan:";
            } else if (tab === 'fd') {
                amountLabel.textContent = "Fixed Deposit (FD) Investment Amount";
                periodLabel.textContent = "Deposit Duration";
                box1Title.textContent = "Monthly Interest Income";
                box2Title.textContent = "Maturity Total Interest";
                sheetLabelAmount.textContent = "Invested Capital:";
                sheetLabelTotal.textContent = "Total Value at Maturity:";
            }

            calculateFinance();
        }

        function calculateFinance() {
            let p = parseFloat(amountInput.value) || 0;
            let annualRate = parseFloat(rateInput.value) || 0;
            let years = parseInt(periodSelect.value) || 1;
            
            let r = (annualRate / 100) / 12; // Monthly interest rate
            let n = years * 12; // Total months

            const formatLKR = (num) => "LKR " + num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

            if (p <= 0 || annualRate <= 0) {
                box1Value.textContent = formatLKR(0);
                box2Value.textContent = formatLKR(0);
                sheetAmount.textContent = formatLKR(0);
                sheetInterest.textContent = formatLKR(0);
                sheetTotal.textContent = formatLKR(0);
                return;
            }

            if (currentTab === 'leasing' || currentTab === 'loan') {
                // Equated Monthly Installment (EMI) Formula
                // EMI = [P x R x (1+R)^N] / [(1+R)^N - 1]
                let emi = (p * r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
                let totalPayable = emi * n;
                let totalInterest = totalPayable - p;

                box1Value.textContent = formatLKR(emi);
                box2Value.textContent = formatLKR(totalInterest);
                
                sheetAmount.textContent = formatLKR(p);
                sheetInterest.textContent = formatLKR(totalInterest);
                sheetTotal.textContent = formatLKR(totalPayable);

            } else if (currentTab === 'fd') {
                // FD Calculation (Simple Monthly interest output vs Total Maturity Interest)
                let totalMaturityInterest = p * (annualRate / 100) * years;
                let monthlyInterest = totalMaturityInterest / n;
                let totalMaturityValue = p + totalMaturityInterest;

                box1Value.textContent = formatLKR(monthlyInterest);
                box2Value.textContent = formatLKR(totalMaturityInterest);
                
                sheetAmount.textContent = formatLKR(p);
                sheetInterest.textContent = formatLKR(totalMaturityInterest);
                sheetTotal.textContent = formatLKR(totalMaturityValue);
            }
        }

        // Listeners
        amountInput.addEventListener('input', calculateFinance);
        rateInput.addEventListener('input', calculateFinance);
        periodSelect.addEventListener('change', calculateFinance);

        // Theme Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement;

        const currentTheme = localStorage.getItem('theme') || 'dark';
        if (currentTheme === 'light') {
            htmlElement.classList.add('light');
            themeIcon.className = 'fa-solid fa-sun';
        } else {
            htmlElement.classList.remove('light');
            themeIcon.className = 'fa-solid fa-moon';
        }

        themeToggleBtn.addEventListener('click', () => {
            if (htmlElement.classList.contains('light')) {
                htmlElement.classList.remove('light');
                themeIcon.className = 'fa-solid fa-moon';
                localStorage.setItem('theme', 'dark');
            } else {
                htmlElement.classList.add('light');
                themeIcon.className = 'fa-solid fa-sun';
                localStorage.setItem('theme', 'light');
            }
        });

        // Initialize
        calculateFinance();
    </script>
</body>
</html>
